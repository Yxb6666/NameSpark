<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 昵称生成器</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero-card">
        <p class="eyebrow">Single Page Demo</p>
        <h1>AI 昵称生成器</h1>
        <p class="hero-text">
          帮你快速生成适合网名、游戏 ID、社媒账号名和角色名的候选昵称。
        </p>
      </header>

      <main class="main-grid">
        <section class="panel-card">
          <div class="section-heading">
            <h2>生成设置</h2>
            <p>选择用途、风格和语言，点击按钮立即生成昵称。</p>
          </div>

          <form id="generator-form" class="generator-form">
            <label class="field">
              <span>用途</span>
              <select name="usage">
                <option value="nickname">网名 / 昵称</option>
                <option value="gameId">游戏 ID</option>
                <option value="social">社媒账号名</option>
                <option value="character">角色名</option>
              </select>
            </label>

            <label class="field">
              <span>风格</span>
              <select name="style">
                <option value="cute">可爱</option>
                <option value="cool">高冷</option>
                <option value="mystery">神秘</option>
                <option value="art">文艺</option>
                <option value="funny">搞笑</option>
                <option value="chuuni">中二</option>
              </select>
            </label>

            <label class="field">
              <span>语言</span>
              <select name="language">
                <option value="zh">中文</option>
                <option value="en">英文</option>
                <option value="mix">混合</option>
              </select>
            </label>

            <label class="field">
              <span>生成数量</span>
              <select name="count">
                <option value="1">1</option>
                <option value="5" selected>5</option>
                <option value="10">10</option>
              </select>
            </label>

            <label class="field">
              <span>字数模式</span>
              <select name="lengthMode" id="length-mode-select">
                <option value="broad" selected>宽泛模式</option>
                <option value="exact">精确模式</option>
              </select>
            </label>

            <label class="field" id="broad-length-field">
              <span>宽泛字数</span>
              <select name="length">
                <option value="short">短</option>
                <option value="medium" selected>中</option>
                <option value="long">长</option>
              </select>
            </label>

            <label class="field is-hidden" id="exact-length-field">
              <span>精确字数</span>
              <select name="exactLength">
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" selected>4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
              </select>
            </label>

            <label class="toggle-field">
              <input type="checkbox" name="special" />
              <span>启用特殊符号风格</span>
            </label>

            <button type="submit" class="primary-button">生成昵称</button>
          </form>
        </section>

        <section class="panel-card">
          <div class="section-heading">
            <h2>生成结果</h2>
            <p>当前通过本地后端调用智谱 BigModel 生成真实结果。</p>
          </div>

          <div id="result-summary" class="result-summary">
            请选择条件后生成昵称。
          </div>
          <div id="status-message" class="status-message" aria-live="polite"></div>
          <div id="results" class="results-grid"></div>
        </section>
      </main>

      <section class="bottom-grid">
        <section class="panel-card">
          <div class="section-heading">
            <h2>历史记录</h2>
            <p>生成成功后会自动保存到本地浏览器。</p>
          </div>
          <div id="history-list" class="simple-list"></div>
        </section>

        <section class="panel-card">
          <div class="section-heading">
            <h2>收藏区</h2>
            <p>你收藏的昵称会保存在 localStorage 中。</p>
          </div>
          <div id="favorite-list" class="simple-list"></div>
        </section>
      </section>
    </div>

    <script src="./src/js/generator.js" defer></script>
    <script src="./src/js/app.js" defer></script>
  </body>
</html>
